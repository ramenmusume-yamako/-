<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>走れ！ラーメン娘！！</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #2c3e50; 
            display: flex; align-items: center; justify-content: center;
            width: 100vw; 
            height: 100dvh; 
            touch-action: none;
            font-family: sans-serif;
            box-sizing: border-box;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        canvas { 
            background: #ecf0f1; 
            display: block;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            max-width: 100%; 
            max-height: 100%;
            width: auto; 
            height: auto;
            object-fit: contain;
        }
        #ui { 
            position: absolute; 
            z-index: 100;
            pointer-events: none; 
            color: #2c3e50; 
            font-weight: bold;
            background: rgba(255,255,255,0.6); 
            padding: 5px 10px; 
            font-size: 18px; 
            border-radius: 5px;
            display: none;
        }
        @media (max-width: 959px) {
            #ui { font-size: 12px; padding: 3px 6px; }
        }
    </style>
</head>
<body>
    <div id="ui">BEST: 0<br>SCORE: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        const V_WIDTH = 1280;
        const V_HEIGHT = 720;
        canvas.width = V_WIDTH;
        canvas.height = V_HEIGHT;

        const isPC = window.innerWidth >= 960;

        // --- オーディオ設定 ---
        const bgm = new Audio('CHINA_BOY.mp3'); 
        bgm.loop = true;                  
        bgm.volume = 0.5;                 

        const seStart = new Audio('dora.mp3'); 
        seStart.volume = 1.0; 

        // --- 画像読み込み ---
        const pImgL = new Image(); const pImgR = new Image();
        pImgL.src = 'meanal.png'; pImgR.src = 'meanar.png';
        let pReadyCount = 0; pImgL.onload = pImgR.onload = () => { pReadyCount++; };

        const bgImages = [];
        const bgSrcs = ['bg1.jpg', 'bg2.jpg', 'bg3.jpg'];
        let bgReadyCount = 0; let bgScroll = 0;
        bgSrcs.forEach((src, index) => {
            bgImages[index] = new Image(); bgImages[index].src = src;
            bgImages[index].onload = () => { bgReadyCount++; };
        });

        const imgNaruto = new Image(); imgNaruto.src = 'naruto.png';
        const imgMenma = new Image();  imgMenma.src = 'menma.png';
        const imgNori = new Image();   imgNori.src = 'nori.png';

        const imgStartCallBg = new Image(); 
        imgStartCallBg.src = 'start_bg.png';

        // --- 設定値 ---
        const p_sz = isPC ? 220 : 260; 
        const GROUND_Y = V_HEIGHT - 60; 

        const BASE_GRAVITY = isPC ? 1.2 : 1.8; 
        const BASE_JUMP = isPC ? -26.0 : -35.0; 

        let gameState = 'START';
        let score = 0;
        let displayScore = 0; 
        let countTimer = 0;   
        let startCallTimer = 0; 
        let gameOverTimer = 0; 
        let highScore = localStorage.getItem('dinoBestTime') || 0;
        const initialBaseSpeed = isPC ? 8.0 : 13.0; 
        let currentSpeed = initialBaseSpeed;

        let speedPhaseTimer = 0;      
        let nextResetThreshold = 0;   

        const player = { 
            x: 100, y: GROUND_Y - p_sz, width: p_sz, height: p_sz, 
            vy: 0, gravity: BASE_GRAVITY, isJumping: false, animTimer: 0
        };

        const obstacleTypes = [
            { id:'menma', w: 110, h: 220, img: imgMenma },
            { id:'nori',  w: 220, h: 100, img: imgNori },
            { id:'naruto',w: 120, h: 120, img: imgNaruto }
        ];

        let obstacles = [];
        let spawnTimer = 0;
        let nextSpawnThreshold = 60; 

        function resize() {
            const rect = canvas.getBoundingClientRect();
            const offset = window.innerWidth >= 960 ? 20 : 10;
            ui.style.top = (rect.top + offset) + "px";
            ui.style.left = (rect.left + offset) + "px";
        }
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => {
            setTimeout(resize, 200);
            setTimeout(resize, 500);
        });
        resize();

        function setRandomResetThreshold() {
            const minFrames = 40 * 60;
            const maxFrames = 60 * 60;
            nextResetThreshold = minFrames + Math.random() * (maxFrames - minFrames);
            speedPhaseTimer = 0; 
        }

        const handleInput = (e) => {
            if (e.type === 'mousedown' && e.button === 0) return;
            if (e.code && !['Space', 'ArrowUp'].includes(e.code)) return;
            
            if (gameState === 'START') {
                seStart.play().catch(o => {}); 
                resetGame();
                gameState = 'PLAYING';
                startCallTimer = 120; 
                ui.style.display = 'block';
                return;
            }
            
            if (gameState === 'GAMEOVER') {
                if (gameOverTimer > 0) return;

                if (displayScore < Math.floor(score)) {
                    displayScore = Math.floor(score);
                    return;
                }
                seStart.play().catch(o => {}); 
                resetGame();
                gameState = 'PLAYING';
                startCallTimer = 120; 
                ui.style.display = 'block';
                return;
            }

            if (gameState === 'PLAYING' && startCallTimer <= 0 && !player.isJumping) {
                player.isJumping = true;
                
                // ★ジャンプ初速の変化をより緩やかにマイルドに調整
                const speedRatio = currentSpeed / initialBaseSpeed;
                const gentleRatio = 1.0 + (speedRatio - 1.0) * 0.4; // 速度変化の影響を40%にマイルド化
                player.vy = BASE_JUMP * Math.sqrt(gentleRatio);
            }
        };

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('keydown', handleInput);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});

        function resetGame() {
            score = 0; 
            displayScore = 0; 
            countTimer = 0; 
            startCallTimer = 0; 
            gameOverTimer = 0; 
            currentSpeed = initialBaseSpeed;
            obstacles = []; spawnTimer = 0; nextSpawnThreshold = 60;
            player.y = GROUND_Y - player.height; 
            player.vy = 0; 
            player.gravity = BASE_GRAVITY; 
            player.isJumping = false;
            
            setRandomResetThreshold(); 
        }

        function update() {
            if (gameState === 'PLAYING') {
                player.animTimer++; 

                if (startCallTimer > 0) {
                    startCallTimer--;
                    bgScroll += initialBaseSpeed * 0.7;

                    if (startCallTimer === 0) {
                        bgm.play().catch(o => {});
                    }
                } else {
                    currentSpeed += isPC ? 0.004 : 0.007; 
                    score += 1 / 60; 
                    
                    bgScroll += currentSpeed * 0.7; 

                    speedPhaseTimer++;
                    if (speedPhaseTimer >= nextResetThreshold) {
                        currentSpeed = initialBaseSpeed; 
                        setRandomResetThreshold();       
                    }

                    // ★【ここを修正！】重力が重くなるテンポを劇的に遅く、滑らかにしました
                    const speedRatio = currentSpeed / initialBaseSpeed;
                    // ルート(Math.sqrt)を取り、さらに「1 + 変化量の半分(0.5)」に抑えることで、落下速度の急増を防ぎます
                    const gentleGravityRatio = 1.0 + (Math.sqrt(speedRatio) - 1.0) * 0.5;
                    player.gravity = BASE_GRAVITY * gentleGravityRatio;

                    player.vy += player.gravity;
                    player.y += player.vy;

                    if (player.y > GROUND_Y - player.height) {
                        player.y = GROUND_Y - player.height;
                        player.vy = 0;
                        player.isJumping = false;
                    }

                    spawnTimer += currentSpeed;
                    if (spawnTimer > nextSpawnThreshold) {
                        const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                        obstacles.push({ x: V_WIDTH, y: GROUND_Y - type.h, ...type });
                        spawnTimer = 0;
                        nextSpawnThreshold = 500 + (currentSpeed * 12) + (Math.random() * 400);
                    }

                    for (let i = obstacles.length - 1; i >= 0; i--) {
                        let o = obstacles[i];
                        o.x -= currentSpeed;

                        const pL = player.x + player.width * 0.45, pR = player.x + player.width * 0.55;
                        const pT = player.y + player.height * 0.3, pB = player.y + player.height * 0.85;
                        const oL = o.x + o.w * 0.2, oR = o.x + o.w * 0.8;
                        const oT = o.y + o.h * 0.2, oB = o.y + o.h * 0.9;

                        if (pL < oR && pR > oL && pT < oB && pB > oT) {
                            gameState = 'GAMEOVER';
                            ui.style.display = 'none';
                            
                            bgm.pause();
                            bgm.currentTime = 0;
                            
                            seStart.currentTime = 0;
                            seStart.play().catch(o => {}); 

                            gameOverTimer = 120; 

                            if (score > highScore) { 
                                highScore = score; 
                                localStorage.setItem('dinoBestTime', highScore); 
                            }
                        }
                        if (o.x + o.w < -100) obstacles.splice(i, 1);
                    }
                }
                ui.innerHTML = `BEST: ${Math.floor(highScore)}<br>SCORE: ${Math.floor(score)}`;
            }

            if (gameState === 'GAMEOVER') {
                if (gameOverTimer > 0) {
                    gameOverTimer--; 
                } else {
                    const targetScore = Math.floor(score);
                    if (displayScore < targetScore) {
                        countTimer++;
                        if (countTimer >= 4) {
                            displayScore += 1;
                            countTimer = 0;
                        }
                    }
                }
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);
            if (bgReadyCount > 0) {
                let offsetX = -(bgScroll % (V_WIDTH * 3));
                for (let j = 0; j < 2; j++) {
                    for (let i = 0; i < 3; i++) {
                        if (bgImages[i] && bgImages[i].complete) {
                            ctx.drawImage(bgImages[i], offsetX + (j * V_WIDTH * 3) + (i * V_WIDTH), 0, V_WIDTH, V_HEIGHT);
                        }
                    }
                }
            }
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(0, GROUND_Y, V_WIDTH, 4);

            if (pReadyCount === 2) {
                const currentImg = (Math.floor(player.animTimer / 30) % 2 === 0) ? pImgL : pImgR;
                ctx.drawImage(currentImg, player.x, player.y, player.width, player.height);
            }

            obstacles.forEach(o => {
                if (o.img && o.img.complete) ctx.drawImage(o.img, o.x, o.y, o.w, o.h);
            });

            if (gameState === 'PLAYING' && startCallTimer > 0) {
                ctx.save();
                if (startCallTimer < 15) {
                    ctx.globalAlpha = startCallTimer / 15;
                }
                
                if (imgStartCallBg.complete && imgStartCallBg.width > 0) {
                    const imgW = imgStartCallBg.width;
                    const imgH = imgStartCallBg.height;
                    ctx.drawImage(imgStartCallBg, V_WIDTH / 2 - imgW / 2, V_HEIGHT / 2 - imgH / 2);
                }

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#e74c3c'; 
                ctx.font = 'bold 90px sans-serif';
                ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                ctx.shadowBlur = 10;
                ctx.fillText('スタート！', V_WIDTH / 2, V_HEIGHT / 2);
                ctx.restore();
            }

            if (gameState === 'START' || gameState === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);
                ctx.textAlign = 'center';
                ctx.shadowBlur = 0;              
                
                if (gameState === 'START') {
                    ctx.textBaseline = 'alphabetic';
                    ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 80px sans-serif';
                    ctx.fillText('走れ！ラーメン娘！！', V_WIDTH / 2, V_HEIGHT / 2 - 100);
                    ctx.fillStyle = 'white'; ctx.font = '30px sans-serif';
                    ctx.fillText('スペースキー または タップでジャンプ！', V_WIDTH / 2, V_HEIGHT / 2 + 30);
                    ctx.font = 'bold 36px sans-serif'; ctx.fillStyle = '#f1c40f';
                    ctx.fillText('>> Press Space or Tap <<', V_WIDTH / 2, V_HEIGHT / 2 + 180);
                } else {
                    ctx.save();
                    
                    let textY, fontSize;
                    if (gameOverTimer > 0) {
                        ctx.textBaseline = 'middle';
                        textY = V_HEIGHT / 2;
                        fontSize = 120; 
                    } else {
                        ctx.textBaseline = 'alphabetic';
                        textY = V_HEIGHT / 2 - 100;
                        fontSize = 80;
                    }

                    ctx.fillStyle = '#e67e22'; 
                    ctx.font = `bold ${fontSize}px sans-serif`;
                    ctx.fillText('完 食', V_WIDTH / 2, textY);
                    ctx.restore();
                    
                    if (gameOverTimer === 0) {
                        ctx.fillStyle = 'white'; ctx.font = '45px sans-serif';
                        ctx.fillText(`記録: ${displayScore} 秒`, V_WIDTH / 2, V_HEIGHT / 2 + 10);
                        
                        ctx.font = '30px sans-serif';
                        ctx.fillText(`最高記録: ${Math.floor(highScore)} 秒`, V_WIDTH / 2, V_HEIGHT / 2 + 65);
                        
                        ctx.fillStyle = 'white';
                        if (displayScore >= Math.floor(score)) {
                            ctx.fillText('スペースキー または タップでリトライ！', V_WIDTH / 2, V_HEIGHT / 2 + 160);
                        } else {
                            ctx.fillStyle = '#7f8c8d';
                            ctx.font = '24px sans-serif';
                            ctx.fillText('画面タップで演出をスキップ', V_WIDTH / 2, V_HEIGHT / 2 + 160);
                        }
                    }
                }
            }
        }
        
        window.addEventListener('load', resize);
        update();
    </script>
</body>
</html>
