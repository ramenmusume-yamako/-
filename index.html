<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>走れ！ラーメン娘！！</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #2c3e50; 
            display: flex; align-items: center; justify-content: center;
            width: 100vw; height: 100vh;
            touch-action: none;
            font-family: sans-serif;
        }
        canvas { 
            background: #ecf0f1; 
            display: block;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            /* ↓ 画面内に必ず収めるための設定 */
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        #ui { 
            position: absolute; 
            z-index: 100;
            pointer-events: none;
            color: #2c3e50;
            font-weight: bold;
            background: rgba(255,255,255,0.6); 
            padding: 5px 10px;
            font-size: 18px; 
            border-radius: 5px;
            display: none;
        }
        @media (max-width: 959px) {
            #ui {
                font-size: 12px; 
                padding: 3px 6px;
            }
        }
    </style>
</head>
<body>
    <div id="ui">BEST: 0<br>SCORE: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        const V_WIDTH = 1280;
        const V_HEIGHT = 720;
        canvas.width = V_WIDTH;
        canvas.height = V_HEIGHT;

        const isPC = window.innerWidth >= 960;

        // --- 画像読み込み ---
        const pImgL = new Image(); const pImgR = new Image();
        pImgL.src = 'meanal.png'; pImgR.src = 'meanar.png';
        let pReadyCount = 0; pImgL.onload = pImgR.onload = () => { pReadyCount++; };

        const bgImages = [];
        const bgSrcs = ['bg1.jpg', 'bg2.jpg', 'bg3.jpg'];
        let bgReadyCount = 0; let bgScroll = 0;
        bgSrcs.forEach((src, index) => {
            bgImages[index] = new Image(); bgImages[index].src = src;
            bgImages[index].onload = () => { bgReadyCount++; };
        });

        const imgNaruto = new Image(); imgNaruto.src = 'naruto.png';
        const imgMenma = new Image();  imgMenma.src = 'menma.png';
        const imgNori = new Image();   imgNori.src = 'nori.png';

        // --- 設定値 ---
        const p_sz = isPC ? 220 : 260; 
        const p_gravity = isPC ? 1.0 : 1.5;
        const JUMP_BIG = isPC ? -24.0 : -33.0; 

        let gameState = 'START';
        let score = 0;
        let highScore = localStorage.getItem('dinoBestTime') || 0;
        let cycleTimer = 0; 
        const initialBaseSpeed = isPC ? 7.0 : 12.5; 
        let currentSpeed = initialBaseSpeed;

        const player = { 
            x: 100, y: 0, width: p_sz, height: p_sz, 
            vy: 0, gravity: p_gravity, isJumping: false, animTimer: 0
        };

        const obstacleTypes = isPC ? [
            { w: 100, h: 200, img: imgMenma,  padW: 0.2, padH: 0.3 },
            { w: 210, h: 90,  img: imgNori,   padW: 0.7, padH: 0.2 },
            { w: 110, h: 110, img: imgNaruto, padW: 0.3, padH: 0.3 }
        ] : [
            { w: 130, h: 240, img: imgMenma,  padW: 0.3, padH: 0.3 },
            { w: 240, h: 120, img: imgNori,   padW: 0.3, padH: 0.3 },
            { w: 140, h: 140, img: imgNaruto, padW: 0.3, padH: 0.3 }
        ];

        let obstacles = [];
        let spawnTimer = 0;
        let nextSpawnThreshold = 40; 

        function resize() {
            // キャンバスが実際に表示されている位置とサイズを取得
            const rect = canvas.getBoundingClientRect();
            const offset = window.innerWidth >= 960 ? 20 : 10;
            // UIの位置を表示されているキャンバスの左上に合わせる
            ui.style.top = (rect.top + offset) + "px";
            ui.style.left = (rect.left + offset) + "px";
        }
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 200));
        resize();

        const handleInput = (e) => {
            if (e.type === 'mousedown' && e.button === 0) return;
            if (e.code && !['Space', 'ArrowUp'].includes(e.code)) return;
            if (gameState !== 'PLAYING') {
                resetGame();
                gameState = 'PLAYING';
                ui.style.display = 'block';
                return;
            }
            if (!player.isJumping) {
                player.isJumping = true;
                player.vy = JUMP_BIG;
            }
        };

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('keydown', handleInput);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});

        function resetGame() {
            score = 0; cycleTimer = 0; currentSpeed = initialBaseSpeed;
            obstacles = []; spawnTimer = 0; nextSpawnThreshold = 40;
            player.y = 0; player.vy = 0; player.isJumping = false;
        }

        function update() {
            const groundY = V_HEIGHT - 60; 
            if (gameState === 'PLAYING') {
                cycleTimer++;
                currentSpeed += isPC ? 0.005 : 0.01; 
                score += 1 / 60; 
                player.animTimer++;
                player.vy += player.gravity;
                player.y += player.vy;

                if (player.y > groundY - player.height) {
                    player.y = groundY - player.height;
                    player.vy = 0;
                    player.isJumping = false;
                }

                spawnTimer += (currentSpeed / 10);
                if (spawnTimer > nextSpawnThreshold) {
                    const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                    obstacles.push({ x: V_WIDTH, y: groundY - type.h, ...type });
                    spawnTimer = 0;
                    nextSpawnThreshold = 30 + (Math.random() * 40);
                }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let o = obstacles[i];
                    o.x -= currentSpeed;

                    const pL = player.x + player.width * 0.4, pR = player.x + player.width * 0.6;
                    const pT = player.y + player.height * 0.2, pB = player.y + player.height * 0.9;
                    const oL = o.x + o.w * 0.2, oR = o.x + o.w * 0.8;
                    const oT = o.y + o.h * 0.2, oB = o.y + o.h * 0.9;

                    if (pL < oR && pR > oL && pT < oB && pB > oT) {
                        gameState = 'GAMEOVER';
                        ui.style.display = 'none';
                        if (score > highScore) { 
                            highScore = score; 
                            localStorage.setItem('dinoBestTime', highScore); 
                        }
                    }
                    if (o.x + o.w < 0) obstacles.splice(i, 1);
                }
                ui.innerHTML = `BEST: ${Math.floor(highScore)}<br>SCORE: ${Math.floor(score)}`;
            }
            draw(groundY);
            requestAnimationFrame(update);
        }

        function draw(groundY) {
            ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);
            if (bgReadyCount > 0) {
                if (gameState === 'PLAYING') bgScroll += currentSpeed * 0.8;
                let offsetX = -(bgScroll % (V_WIDTH * 3));
                for (let j = 0; j < 2; j++) {
                    for (let i = 0; i < 3; i++) {
                        if (bgImages[i] && bgImages[i].complete) {
                            ctx.drawImage(bgImages[i], offsetX + (j * V_WIDTH * 3) + (i * V_WIDTH), 0, V_WIDTH, V_HEIGHT);
                        }
                    }
                }
            }
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(0, groundY, V_WIDTH, 4);

            if (pReadyCount === 2) {
                const currentImg = (Math.floor(player.animTimer / 30) % 2 === 0) ? pImgL : pImgR;
                ctx.drawImage(currentImg, player.x, player.y, player.width, player.height);
            }

            obstacles.forEach(o => {
                if (o.img && o.img.complete) ctx.drawImage(o.img, o.x, o.y, o.w, o.h);
            });

            if (gameState === 'START' || gameState === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);
                ctx.textAlign = 'center';
                if (gameState === 'START') {
                    ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 80px sans-serif';
                    ctx.fillText('走れ！ラーメン娘！！', V_WIDTH / 2, V_HEIGHT / 2 - 100);
                    ctx.fillStyle = 'white'; ctx.font = '30px sans-serif';
                    ctx.fillText('スペースキー または タップでジャンプ！', V_WIDTH / 2, V_HEIGHT / 2 + 30);
                    ctx.font = 'bold 36px sans-serif'; ctx.fillStyle = '#f1c40f';
                    ctx.fillText('>> Press Space or Tap <<', V_WIDTH / 2, V_HEIGHT / 2 + 180);
                } else {
                    ctx.fillStyle = '#e67e22'; ctx.font = 'bold 80px sans-serif';
                    ctx.fillText('完 食', V_WIDTH / 2, V_HEIGHT / 2 - 100);
                    ctx.fillStyle = 'white'; ctx.font = '45px sans-serif';
                    ctx.fillText(`記録: ${Math.floor(score)} 秒`, V_WIDTH / 2, V_HEIGHT / 2 + 10);
                    ctx.font = '30px sans-serif';
                    ctx.fillText('スペースキー または タップでリトライ！', V_WIDTH / 2, V_HEIGHT / 2 + 160);
                }
            }
        }
        update();
    </script>
</body>
</html>
