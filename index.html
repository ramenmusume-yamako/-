<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Speed Runner - Full Graphics Edition</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #2c3e50; 
            display: flex; align-items: center; justify-content: center;
            width: 100vw; height: 100vh;
            touch-action: none;
            font-family: sans-serif;
        }
        canvas { 
            background: #ecf0f1; 
            display: block;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            aspect-ratio: 16 / 9;
            width: 100%;
            height: auto;
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
        #ui { 
            position: absolute; 
            z-index: 100;
            pointer-events: none;
            color: #2c3e50;
            font-weight: bold;
            background: rgba(255,255,255,0.6); 
            padding: 5px 10px;
            font-size: 18px; 
            border-radius: 5px;
            top: 20px;
            left: 20px;
        }
    </style>
</head>
<body>
    <div id="ui">BEST: 0<br>SCORE: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        const V_WIDTH = 1280;
        const V_HEIGHT = 720;
        canvas.width = V_WIDTH;
        canvas.height = V_HEIGHT;

        const isPC = window.innerWidth >= 960;

        // --- 1. キャラ画像の読み込み ---
        const pImgL = new Image();
        const pImgR = new Image();
        pImgL.src = 'meanal.png'; 
        pImgR.src = 'meanar.png'; 
        let pReadyCount = 0;
        pImgL.onload = pImgR.onload = () => { pReadyCount++; };

        // --- 2. 背景画像の設定 (復活！) ---
        const bgImages = [];
        const bgSrcs = ['bg1.jpg', 'bg2.jpg', 'bg3.jpg']; 
        let bgReadyCount = 0;
        let bgScroll = 0;

        bgSrcs.forEach((src, index) => {
            bgImages[index] = new Image();
            bgImages[index].src = src;
            bgImages[index].onload = () => { bgReadyCount++; };
        });

        // --- 設定値 ---
        const p_sz = isPC ? 200 : 250; 
        const p_gravity = isPC ? 1.0 : 1.5;
        const JUMP_BIG = isPC ? -22.0 : -32.0; 

        let gameState = 'START';
        let score = 0;
        let highScore = localStorage.getItem('dinoBest') || 0;
        let cycleTimer = 0; 
        const initialBaseSpeed = isPC ? 7.0 : 12.5; 
        let currentSpeed = initialBaseSpeed;

        const player = { 
            x: 100, 
            y: 0, 
            width: p_sz, 
            height: p_sz, 
            vy: 0, 
            gravity: p_gravity, 
            isJumping: false,
            animTimer: 0
        };

        const obstacleTypes = isPC ? [
            { w: 50, h: 120, pts: 30, color: '#e74c3c' }, 
            { w: 140, h: 50, pts: 25,  color: '#f1c40f' }, 
            { w: 70, h: 70, pts: 21,  color: '#3498db' }
        ] : [
            { w: 65, h: 175, pts: 25, color: '#e74c3c' }, 
            { w: 195, h: 65, pts: 20,  color: '#f1c40f' }, 
            { w: 95, h: 95, pts: 16,  color: '#3498db' }
        ];

        let obstacles = [];
        let spawnTimer = 0;
        let nextSpawnThreshold = 40; 

        function resize() {
            const canvasRect = canvas.getBoundingClientRect();
            ui.style.top = (canvasRect.top + 20) + "px";
            ui.style.left = (canvasRect.left + 20) + "px";
        }
        window.addEventListener('resize', resize);
        resize();

        const handleInput = (e) => {
            if (e.code && !['Space', 'ArrowUp'].includes(e.code)) return;
            if (gameState !== 'PLAYING') {
                resetGame();
                gameState = 'PLAYING';
                return;
            }
            if (!player.isJumping) {
                player.isJumping = true;
                player.vy = JUMP_BIG;
            }
        };

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('keydown', handleInput);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});

        function resetGame() {
            score = 0; cycleTimer = 0;
            currentSpeed = initialBaseSpeed;
            obstacles = []; spawnTimer = 0;
            player.y = 0; player.vy = 0; player.isJumping = false;
        }

        function update() {
            const groundY = V_HEIGHT - 60; 
            if (gameState === 'PLAYING') {
                cycleTimer++;
                currentSpeed += isPC ? 0.002 : 0.005;
                player.animTimer++;

                player.vy += player.gravity;
                player.y += player.vy;

                if (player.y > groundY - player.height) {
                    player.y = groundY - player.height;
                    player.vy = 0;
                    player.isJumping = false;
                }

                spawnTimer += (currentSpeed / 10);
                if (spawnTimer > nextSpawnThreshold) {
                    const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                    obstacles.push({ x: V_WIDTH, y: groundY - type.h, ...type, passed: false });
                    spawnTimer = 0;
                    nextSpawnThreshold = 50 + Math.random() * 80;
                }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let o = obstacles[i];
                    o.x -= currentSpeed;

                    const pPadW = player.width * 0.4; 
                    const pPadH = player.height * 0.15;
                    const pLeft = player.x + pPadW;
                    const pRight = player.x + player.width - pPadW;
                    const pTop = player.y + pPadH;
                    const pBottom = player.y + player.height - pPadH;

                    if (pLeft < o.x + o.w && pRight > o.x && pTop < o.y + o.h && pBottom > o.y) {
                        gameState = 'GAMEOVER';
                        if (score > highScore) { highScore = score; localStorage.setItem('dinoBest', highScore); }
                    }
                    if (!o.passed && o.x + o.w < player.x) { score += o.pts; o.passed = true; }
                    if (o.x + o.w < 0) obstacles.splice(i, 1);
                }
                ui.innerHTML = `BEST: ${highScore}<br>SCORE: ${score}`;
            }
            draw(groundY);
            requestAnimationFrame(update);
        }

        function draw(groundY) {
            ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);

            // --- 背景描画 (復活＆スマホ最適化版) ---
            if (bgReadyCount > 0) {
                if (gameState === 'PLAYING') bgScroll += currentSpeed * 0.8;
                let offsetX = -(bgScroll % (V_WIDTH * 3));
                for (let j = 0; j < 2; j++) {
                    for (let i = 0; i < 3; i++) {
                        if (bgImages[i] && bgImages[i].complete) {
                            ctx.drawImage(bgImages[i], offsetX + (j * V_WIDTH * 3) + (i * V_WIDTH), 0, V_WIDTH, V_HEIGHT);
                        }
                    }
                }
            } else {
                // 背景が読み込まれるまでの仮の色
                ctx.fillStyle = "#ecf0f1"; 
                ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);
            }

            // 地面
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(0, groundY, V_WIDTH, 4);

            // プレイヤー描画
            if (pReadyCount === 2) {
                const currentImg = (Math.floor(player.animTimer / 30) % 2 === 0) ? pImgL : pImgR;
                ctx.drawImage(currentImg, player.x, player.y, player.width, player.height);
            } else {
                ctx.fillStyle = '#27ae60';
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }

            // 障害物
            obstacles.forEach(o => {
                ctx.fillStyle = o.color;
                ctx.fillRect(o.x, o.y, o.w, o.h);
            });

            if (gameState === 'START' || gameState === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);
                ctx.fillStyle = 'white';
                ctx.textAlign = 'center';
                ctx.font = 'bold 40px sans-serif';
                ctx.fillText(gameState === 'START' ? 'SPEED RUNNER' : 'GAME OVER', V_WIDTH / 2, V_HEIGHT / 2 - 20);
                ctx.font = '24px sans-serif';
                ctx.fillText('Tap to Start', V_WIDTH / 2, V_HEIGHT / 2 + 40);
            }
        }
        update();
    </script>
</body>
</html>
